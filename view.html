  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous">

  <script>
    const elName = document.getElementById("name");
    const elNumber = document.getElementById("number");
    const elType = document.getElementById("type");
    const elPicture = document.getElementById("picture");
    const elNextPokemon = document.getElementById("nextPokemon");
    const elPrevPokemon = document.getElementById("prevPokemon");

    const elBGCircle = document.getElementById("circleBG");
    const elCircleBGIcon = document.getElementById("circleBGIcon");

    const elBio = document.getElementById("bio");
    const elPrevPokemonLink = document.getElementById("prevPokemonLink");
    const elNextPokemonLink = document.getElementById("nextPokemonLink");

    const elPrevPokemonCircle = document.getElementById("prevPokemonCircle");
    const elNextPokemonCircle = document.getElementById("nextPokemonCircle");

    const elWeight = document.getElementById("weight");
    const elHeight = document.getElementById("height");
    const elAbility1 = document.getElementById("ability1");
    const elAbility2 = document.getElementById("ability2");

    const elDefaultVariety = document.getElementById("default-variety-text");
    const elVarietiesSection = document.getElementById("varieties-section");
    const elVarietiesContainer = document.getElementById("varieties-container");

    const elFormsSection = document.getElementById("forms-section");
    const elFormsContainer = document.getElementById("forms-container");

    const elEvoContainer = document.getElementById("evo-container");

    const elTypeNormalDmg = document.getElementById("typeNormalDmg");
    const elTypeWeakness = document.getElementById("typeWeakness");
    const elTypeImmunity = document.getElementById("typeImmunity");
    const elTypeResistance = document.getElementById("typeResistance");

    const elSpritesContainer = document.getElementById("sprites-container");

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    if (id) {
      loadPokemonFull(id)
        .then(async (pokemonData) => {
          const {
            pokemon,
            species,
            nextPokemon,
            prevPokemon,
            hasOtherVarieties,
            formsData,
            hasOtherForms,
            pokemonVarieties,
            defaultVarietyData,
            evolution,
            typeEffectiveness
          } = pokemonData;

          const pokemonName = pokemon.species.name;
          const primaryType = pokemon.types[0].type.name;
          const primaryColor = typeColors[primaryType];
          const secondaryType = pokemon.types[1]?.type.name || primaryType;
          const secondaryColor = typeColors[secondaryType] || "white";

          const officialArtwork =
            pokemon.sprites.other?.["official-artwork"]?.front_default ||
            pokemon.sprites.front_default;

          elPicture.src = officialArtwork;
          elName.textContent = titleCase(pokemonName);
          elNumber.textContent = `No ${String(defaultVarietyData.id).padStart(4, "0")}`;
          elType.innerHTML = buildMainTypePills(pokemon);

          elNextPokemon.src = getBestPokemonImage(nextPokemon);
          elPrevPokemon.src = getBestPokemonImage(prevPokemon);

          elNextPokemonLink.href = `view.html?id=${nextPokemon.id}`;
          elPrevPokemonLink.href = `view.html?id=${prevPokemon.id}`;

          elNextPokemonLink.title = titleCase(nextPokemon.species.name);
          elPrevPokemonLink.title = titleCase(prevPokemon.species.name);

          elBGCircle.style.backgroundImage = `linear-gradient(145deg, ${secondaryColor}, ${primaryColor})`;
          elCircleBGIcon.src = `assets/img/types/outlines/${primaryType}.svg`;

          elPrevPokemonCircle.style.backgroundColor = `${typeColors[prevPokemon.types[0].type.name]}50`;
          elNextPokemonCircle.style.backgroundColor = `${typeColors[nextPokemon.types[0].type.name]}50`;

          const flavorText = getEnglishFlavorText(species);
          const genus = getEnglishGenus(species);

          if (flavorText && genus) {
            elBio.innerHTML = `The ${genus.genus}. ${flavorText.flavor_text}<span class='ms-2 text-secondary small'>(Pokémon ${titleCase(flavorText.version.name)})</span>`;
          }

          elWeight.innerHTML = `${pokemon.weight / 10}<span class='text-secondary small'>kg</span>`;
          elHeight.innerHTML = `${pokemon.height / 10}<span class='text-secondary small'>m</span>`;

          elAbility1.textContent = pokemon.abilities[0]?.ability?.name
            ? titleCase(pokemon.abilities[0].ability.name)
            : "-";

          const hiddenAbility = pokemon.abilities.find((a) => a.is_hidden);
          elAbility2.textContent = hiddenAbility?.ability?.name
            ? titleCase(hiddenAbility.ability.name)
            : "-";

          elTypeNormalDmg.innerHTML = buildTypeEffPills(typeEffectiveness.normalDamage);
          elTypeWeakness.innerHTML = buildTypeEffPills(typeEffectiveness.weakness);
          elTypeImmunity.innerHTML = buildTypeEffPills(typeEffectiveness.immune);
          elTypeResistance.innerHTML = buildTypeEffPills(typeEffectiveness.resistance);

          renderGameSprites(pokemon.sprites, elSpritesContainer);

          elDefaultVariety.textContent = removeString(
            titleCase(pokemon.species.name),
            titleCase(pokemon.name)
          );

          if (hasOtherVarieties) {
            elDefaultVariety.classList.remove("d-none");
            elVarietiesSection.classList.remove("d-none");

            elVarietiesContainer.innerHTML = pokemonVarieties.map((pokemonV) => {
              return buildPokemonSingleIcon(
                `view.html?id=${pokemonV.id}`,
                getBestPokemonImage(pokemonV),
                removeString(titleCase(pokemon.species.name), titleCase(pokemonV.name))
              );
            }).join("");
          }

          if (hasOtherForms) {
            elFormsSection.classList.remove("d-none");

            elFormsContainer.innerHTML = formsData.map((pokemonF) => {
              return buildPokemonSingleIcon(
                "",
                getBestPokemonImage(pokemonF),
                titleCase(pokemonF.form_name)
              );
            }).join("");
          }

          await renderEvolution(evolution, elEvoContainer);
        })
        .catch((error) => {
          console.error(error);
        });
    }

    document.getElementById("clearBtn").addEventListener("click", () => {
      document.getElementById("searchInput").value = "";
      document.getElementById("typeSelect").value = "";
      window.location.href = "./";
    });
  </script>
