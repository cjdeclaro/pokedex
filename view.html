  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous">
    </script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/singleLoader.js"></script>

  <script>
    // Initialize Elements
    const elName = document.getElementById("name");
    const elNumber = document.getElementById("number");
    const elType = document.getElementById("type");
    const elPicture = document.getElementById("picture");
    const elNextPokemon = document.getElementById("nextPokemon");
    const elPrevPokemon = document.getElementById("prevPokemon");

    const elBGCircle = document.getElementById("circleBG");
    const elCircleBGIcon = document.getElementById("circleBGIcon");

    const elBio = document.getElementById("bio");
    const elPrevPokemonLink = document.getElementById("prevPokemonLink");
    const elNextPokemonLink = document.getElementById("nextPokemonLink");

    const elPrevPokemonCircle = document.getElementById("prevPokemonCircle");
    const elNextPokemonCircle = document.getElementById("nextPokemonCircle");

    const elWeight = document.getElementById("weight");
    const elHeight = document.getElementById("height");
    const elAbility1 = document.getElementById("ability1");
    const elAbility2 = document.getElementById("ability2");

    const elDefaultVariety = document.getElementById('default-variety-text');
    const elVarietiesSection = document.getElementById('varieties-section');
    const elVarietiesContainer = document.getElementById('varieties-container');

    const elFormsSection = document.getElementById('forms-section');
    const elFormsContainer = document.getElementById('forms-container');

    const elEvoSection = document.getElementById('evo-section');
    const elEvoContainer = document.getElementById('evo-container');

    const elTypeNormalDmg = document.getElementById('typeNormalDmg');
    const elTypeWeakness = document.getElementById('typeWeakness');
    const elTypeImmunity = document.getElementById('typeImmunity');
    const elTypeResistance = document.getElementById('typeResistance');


    // Get Data
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);

    const id = urlParams.get('id');

    if (id) {
      loadPokemonFull(id).then((pokemonData) => {
        const pokemon = pokemonData.pokemon;
        const species = pokemonData.species;
        const nextPokemon = pokemonData.nextPokemon;
        const prevPokemon = pokemonData.prevPokemon;

        const hasOtherVarieties = pokemonData.hasOtherVarieties;
        const formsData = pokemonData.formsData;
        const hasOtherForms = pokemonData.hasOtherForms;
        const pokemonVarieties = pokemonData.pokemonVarieties;
        const defaultVarietyData = pokemonData.defaultVarietyData;
        const evolution = pokemonData.evolution;
        const typeEffectiveness = pokemonData.typeEffectiveness;

        let pokemonName = pokemon.species.name;

        let primaryType = pokemon.types[0].type.name;
        let primaryColor = typeColors[primaryType];

        let secondaryType = primaryType;
        let secondaryColor = "white";

        let secondTypePill = "";

        let typePills = `
          <div class="me-2 rounded-5 px-3 py-1 d-flex flex-row align-items-center" style="background-color: `+ primaryColor + `">
            <div class="rounded-circle bg-light single-type-icon me-2">
              <img src="assets/img/types/icons/`+ primaryType + `.svg">
            </div>
            <div class="text-white">
              `+ titleCase(primaryType) + `
            </div>
          </div>
        `;

        if (pokemon.types[1] != undefined) {
          secondaryType = pokemon.types[1].type.name;
          secondaryColor = typeColors[secondaryType];

          typePills += `
          <div class="rounded-5 px-3 py-1 d-flex flex-row align-items-center" style="background-color: `+ secondaryColor + `">
            <div class="rounded-circle bg-light single-type-icon me-2">
              <img src="assets/img/types/icons/`+ secondaryType + `.svg">
            </div>
            <div class="text-white">
              `+ titleCase(secondaryType) + `
            </div>
          </div>`;
        }

        const frontDefault = pokemon.sprites.front_default
        const officialArtwork = pokemon.sprites.other["official-artwork"].front_default;

        elPicture.src = officialArtwork;
        elName.innerHTML = titleCase(pokemonName);
        elNumber.innerHTML += String(defaultVarietyData.id).padStart(4, '0');
        elType.innerHTML = typePills;

        let nextPokemonImg = nextPokemon.sprites.front_default;
        nextPokemonImg = nextPokemonImg == null ? nextPokemon.sprites.other["official-artwork"].front_default : nextPokemonImg;

        let prevPokemonImg = prevPokemon.sprites.front_default;
        prevPokemonImg = prevPokemonImg == null ? prevPokemon.sprites.other["official-artwork"].front_default : prevPokemonImg;

        elNextPokemon.src = nextPokemonImg;
        elPrevPokemon.src = prevPokemonImg;

        elNextPokemonLink.href = "view.html?id=" + nextPokemon.id;
        elPrevPokemonLink.href = "view.html?id=" + prevPokemon.id;

        elNextPokemonLink.title = titleCase(nextPokemon.species.name);
        elPrevPokemonLink.title = titleCase(prevPokemon.species.name);

        elBGCircle.style.backgroundImage = `linear-gradient( 145deg, ` + secondaryColor + `, ` + primaryColor + `)`;
        elCircleBGIcon.src = `assets/img/types/outlines/` + primaryType + `.svg`;

        elPrevPokemonCircle.style.backgroundColor = typeColors[prevPokemon.types[0].type.name] + '50';
        elNextPokemonCircle.style.backgroundColor = typeColors[nextPokemon.types[0].type.name] + '50';

        let flavor_text_json = species.flavor_text_entries.findLast(item => item.language?.name === "en");
        let genus = species.genera.findLast(item => item.language?.name === "en").genus;

        elBio.innerHTML = "The " + genus + ". " + flavor_text_json.flavor_text + "<span class='ms-2 text-secondary small'>(Pokémon " + titleCase(flavor_text_json.version.name) + ")</span>";

        elWeight.innerHTML = pokemon.weight + "<span class='text-secondary small'>kg</span>";
        elHeight.innerHTML = pokemon.height + "<span class='text-secondary small'>in</span>";

        if (pokemon.abilities[0] != undefined) {
          elAbility1.innerHTML = titleCase(pokemon.abilities[0].ability.name);
        }

        if (pokemon.abilities[1] != undefined) {
          elAbility2.innerHTML = titleCase(pokemon.abilities[1].ability.name);
        }

        // Type Effectiveness
        const normalDamageTypes = typeEffectiveness.normalDamage;
        elTypeNormalDmg.innerHTML += buildTypeEffPills(normalDamageTypes);

        const weaknessTypes = typeEffectiveness.weakness;
        elTypeWeakness.innerHTML += buildTypeEffPills(weaknessTypes);

        const immunityTypes = typeEffectiveness.immune;
        elTypeImmunity.innerHTML += buildTypeEffPills(immunityTypes);

        const resistedTypes = typeEffectiveness.resistance;
        elTypeResistance.innerHTML += buildTypeEffPills(resistedTypes);

        // Varieties
        elDefaultVariety.innerHTML = removeString(titleCase(pokemon.species.name), titleCase(pokemon.name));

        if (hasOtherVarieties) {
          elDefaultVariety.classList.remove("d-none");
          elVarietiesSection.classList.remove("d-none");
          pokemonVarieties.forEach(pokemonV => {
            let varietyImg = pokemonV.sprites.front_default;
            varietyImg = varietyImg == null
              ? pokemonV.sprites.other["official-artwork"].front_default
              : varietyImg;

            elVarietiesContainer.innerHTML += buildPokemonSingleIcon("view.html?id=" + pokemonV.id, varietyImg, removeString(titleCase(pokemon.species.name), titleCase(pokemonV.name)));
          });
        }

        // Forms

        if (hasOtherForms) {
          elFormsSection.classList.remove("d-none");
          formsData.forEach(pokemonF => {
            let formImg = pokemonF.sprites.front_default;
            let formTypes = pokemonF.types;

            elFormsContainer.innerHTML += buildPokemonSingleIcon("", formImg, titleCase(pokemonF.form_name));
          });
        }

        // Evolutions
        renderEvolution(evolution);
      });
    }

    const renderEvolution = async (evolution) => {
      let currentEvolutionLine = [evolution.chain];

      while (currentEvolutionLine.length > 0) {
        let evoGroup = "<div class='d-flex flex-row justify-content-center flex-wrap'>";

        const nextEvolutionLine = [];

        for (const currentEvolution of currentEvolutionLine) {
          const pokemonEvoSpecie = await loadAPI(currentEvolution.species.url);
          const pokemonEvoInfo = await loadPokemon(pokemonEvoSpecie.id);

          evoGroup += buildPokemonSingleIcon(
            "view.html?id=" + pokemonEvoInfo.id,
            pokemonEvoInfo.sprites.front_default,
            titleCase(currentEvolution.species.name)
          );

          if (currentEvolution.evolves_to.length > 0) {
            nextEvolutionLine.push(...currentEvolution.evolves_to);
          }
        }

        elEvoContainer.innerHTML += evoGroup + "</div>";
        currentEvolutionLine = nextEvolutionLine;
      }
    };
  </script>
